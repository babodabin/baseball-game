<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>우리팀을 만들자 v0.1</title>
<!-- v0.1 — 1단계: 팀 선택 + 로스터 + 선수 상세 -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=IBM+Plex+Sans+KR:wght@400;500;700&family=IBM+Plex+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0D1811; --panel:#152219; --panel2:#1C2C21; --line:#2A3D30;
  --chalk:#EDEAE0; --dim:#8FA396; --amber:#FFB63B; --amber2:#E89B1C;
  --red:#E4573D;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--bg); color:var(--chalk);
  font-family:'IBM Plex Sans KR',sans-serif; font-size:15px;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
  overscroll-behavior:none;
}
.num{font-family:'IBM Plex Mono',monospace}

/* ── 전광판 헤더 ── */
header{
  position:sticky; top:0; z-index:20;
  background:linear-gradient(#0A130D,#0D1811);
  border-bottom:2px solid var(--amber2);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
}
.board{
  display:flex; align-items:baseline; justify-content:space-between; gap:8px;
}
.board h1{
  font-family:'Black Han Sans',sans-serif; font-weight:400;
  font-size:21px; letter-spacing:.5px; color:var(--amber);
  text-shadow:0 0 12px rgba(255,182,59,.35);
}
.board .ver{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim)}
.subline{margin-top:4px;font-size:12px;color:var(--dim);display:flex;justify-content:space-between}
.subline .myteam{color:var(--chalk);font-weight:700}

/* ── 화면 공통 ── */
.screen{display:none;padding:16px}
.screen.on{display:block}
h2.sec{
  font-family:'Black Han Sans',sans-serif;font-weight:400;font-size:17px;
  margin:4px 0 12px;letter-spacing:.4px;
}
h2.sec small{font-family:'IBM Plex Sans KR';font-size:12px;color:var(--dim);margin-left:8px;font-weight:400}

/* ── 팀 선택 ── */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tcard{
  background:var(--panel);border:1px solid var(--line);border-radius:12px;
  padding:14px 12px;display:flex;flex-direction:column;gap:6px;
  cursor:pointer;transition:transform .08s;
}
.tcard:active{transform:scale(.97)}
.tcard .stripe{height:6px;border-radius:3px}
.tcard .tname{font-weight:700;font-size:15px}
.tcard .treal{font-size:11px;color:var(--dim)}
.notice{
  background:var(--panel2);border:1px dashed var(--line);border-radius:10px;
  padding:12px;font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:14px;
}
.notice b{color:var(--amber)}

/* ── 로스터 ── */
.tabs{display:flex;gap:8px;margin-bottom:12px}
.tabs button{
  flex:1;padding:9px 0;border-radius:9px;border:1px solid var(--line);
  background:var(--panel);color:var(--dim);font-size:14px;font-weight:700;font-family:inherit;
}
.tabs button.on{background:var(--amber);border-color:var(--amber);color:#20180A}
.plist{display:flex;flex-direction:column;gap:8px}
.prow{
  display:flex;align-items:center;gap:10px;
  background:var(--panel);border:1px solid var(--line);border-radius:11px;
  padding:11px 12px;cursor:pointer;
}
.prow:active{background:var(--panel2)}
.prow .pos{
  width:34px;height:34px;border-radius:8px;flex:none;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  background:var(--panel2);border:1px solid var(--line);color:var(--dim);
}
.prow .mid{flex:1;min-width:0}
.prow .nm{font-weight:700;font-size:15px}
.prow .hand{font-size:11px;color:var(--dim);margin-top:1px}
.prow .ovr{
  font-family:'IBM Plex Mono',monospace;font-size:20px;font-weight:700;
  color:var(--amber);width:44px;text-align:right;flex:none;
}
.boost{color:var(--amber2);font-size:10px;font-family:'IBM Plex Mono',monospace}

/* ── 모달 ── */
.mask{
  position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:40;
  display:none;align-items:flex-end;
}
.mask.on{display:flex}
.sheet{
  background:var(--panel);border-top:2px solid var(--amber2);
  border-radius:18px 18px 0 0;width:100%;
  padding:20px 20px calc(24px + env(safe-area-inset-bottom));
  max-height:82vh;overflow-y:auto;
}
.sheet .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px}
.sheet .pname{font-family:'Black Han Sans',sans-serif;font-weight:400;font-size:24px;letter-spacing:.5px}
.sheet .close{background:none;border:none;color:var(--dim);font-size:22px;padding:2px 6px}
.sheet .meta{font-size:13px;color:var(--dim);margin-bottom:14px}
.reveal{
  background:var(--panel2);border:1px solid var(--line);border-radius:10px;
  padding:12px;margin-bottom:16px;font-size:13px;line-height:1.55;
}
.reveal .lbl{font-size:11px;color:var(--amber);letter-spacing:1px;font-family:'IBM Plex Mono',monospace;margin-bottom:4px}
.stat{margin-bottom:10px}
.stat .sl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.stat .sl .v{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--chalk)}
.stat .bar{height:8px;background:var(--panel2);border-radius:4px;overflow:hidden}
.stat .bar i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--amber2),var(--amber))}

/* ── 하단 내비 ── */
nav{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:#0A130D;border-top:1px solid var(--line);
  display:flex;padding-bottom:env(safe-area-inset-bottom);
}
nav button{
  flex:1;background:none;border:none;color:var(--dim);
  font-family:inherit;font-size:11px;padding:9px 0 7px;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
nav button .ic{font-size:19px;line-height:1}
nav button.on{color:var(--amber)}
nav button.lock{opacity:.38}

.btn{
  width:100%;padding:13px 0;border-radius:11px;border:none;
  background:var(--amber);color:#20180A;font-weight:700;font-size:15px;
  font-family:inherit;margin-top:14px;
}
.btn.ghost{background:none;border:1px solid var(--line);color:var(--dim);font-weight:400;font-size:13px}
.locked-msg{padding:60px 20px;text-align:center;color:var(--dim);font-size:14px;line-height:1.8}
.locked-msg .big{font-size:34px;display:block;margin-bottom:10px}
</style>
</head>
<body>

<header>
  <div class="board">
    <h1>우리팀을 만들자!</h1>
    <span class="ver">v0.1</span>
  </div>
  <div class="subline">
    <span id="subLeft">구단을 선택하세요</span>
    <span class="myteam num" id="subRight"></span>
  </div>
</header>

<!-- 팀 선택 -->
<section class="screen" id="scr-select">
  <div class="notice">
    응원할 <b>내 구단</b>을 고르세요. 내 구단 소속 선수 전원에게 <b>능력치 +3 보정</b>이 적용됩니다.<br>
    선수 이름은 유사발음 가명이며, 선수를 터치하면 실제 모델 선수를 확인할 수 있습니다.
  </div>
  <div class="team-grid" id="teamGrid"></div>
</section>

<!-- 구단(로스터) -->
<section class="screen" id="scr-team">
  <h2 class="sec" id="rosterTitle"></h2>
  <div class="tabs">
    <button id="tabBat" class="on">타자</button>
    <button id="tabPit">투수</button>
  </div>
  <div class="plist" id="plist"></div>
  <button class="btn ghost" id="resetBtn">구단 다시 선택 (데이터 초기화)</button>
</section>

<!-- 잠금 화면 -->
<section class="screen" id="scr-lock">
  <div class="locked-msg">
    <span class="big">🔒</span>
    <span id="lockText">다음 업데이트에서 열립니다</span>
  </div>
</section>

<nav>
  <button data-nav="team" class="on"><span class="ic">⚾️</span>구단</button>
  <button data-nav="lineup" class="lock"><span class="ic">📋</span>라인업</button>
  <button data-nav="game" class="lock"><span class="ic">📺</span>경기</button>
  <button data-nav="rank" class="lock"><span class="ic">🏆</span>순위</button>
</nav>

<!-- 선수 상세 시트 -->
<div class="mask" id="mask">
  <div class="sheet" id="sheet"></div>
</div>

 bat:[['박건욱','박건우','RF','우',82,72,60,72,74],['김주언','김주원','SS','양',72,72,74,80,70],['박민욱','박민우','2B','좌',80,54,78,76,74],['권히동','권희동','LF','우',68,70,55,66,72],['데이빗슨','데이비슨','1B','우',62,92,45,62,60],['김형진','김형준','C','우',60,74,40,74,58],['서호천','서호철','3B','우',70,58,62,70,62],['김성옥','김성욱','CF','우',62,68,70,76,56],['오영순','오영수','DH','좌',66,64,50,58,60]],
 pit:[['구창무','구창모','선발','좌',149,74,84,64],['라일링','라일리','선발','우',150,74,80,78],['신민한','신민혁','선발','우',143,80,74,74],['류진옥','류진욱','마무리','우',148,70,74,58]]},

{id:'KW', name:'키윰 히어로즈', real:'키움 히어로즈', c:'#570514',
 bat:[['송성운','송성문','3B','좌',80,78,66,74,74],['이주혁','이주형','CF','좌',74,66,74,74,66],['카디네즈','카디네스','1B','좌',70,76,50,62,60],['김건히','김건희','C','우',66,74,45,68,58],['최주완','최주환','DH','좌',66,68,45,62,64],['임지엽','임지열','RF','우',64,72,58,62,56],['박수존','박수종','LF','우',72,44,76,72,64],['김태신','김태진','2B','좌',66,44,64,70,60],['어준석','어준서','SS','좌',62,40,72,74,58]],
 pit:[['안우신','안우진','선발','우',155,78,88,80],['알칸타레','알칸타라','선발','우',148,72,76,76],['하영빈','하영민','선발','우',144,74,72,72],['주승욱','주승우','마무리','우',146,72,72,58]]}
];

const BOOST = 3; // 내 구단 능력치 보정

/* ───────────── 상태 ───────────── */
let state = load();
function load(){
  try{ return JSON.parse(localStorage.getItem(SAVE_KEY)) || {myTeam:null}; }
  catch(e){ return {myTeam:null}; }
}
function save(){ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }

/* ───────────── 능력치 계산 ───────────── */
function isMine(teamId){ return state.myTeam === teamId; }
function b(v, teamId){ return Math.min(99, v + (isMine(teamId) ? BOOST : 0)); }
// 투수 구속: 보정 시 +1km 상향
function bv(velo, teamId){ return velo + (isMine(teamId) ? 1 : 0); }

function batOvr(p, tid){
  const [,,,,con,pow,spd,def,eye] = p;
  return Math.round((b(con,tid)*.30 + b(pow,tid)*.25 + b(eye,tid)*.15 + b(spd,tid)*.15 + b(def,tid)*.15));
}
function pitOvr(p, tid){
  const [,,,,velo,ctrl,brk,sta] = p;
  const vScore = Math.min(99, Math.max(40, (bv(velo,tid)-125)*2.4)); // 141km≈38→스케일링
  return Math.round(vScore*.30 + b(ctrl,tid)*.30 + b(brk,tid)*.25 + b(sta,tid)*.15);
}

/* ───────────── 화면 전환 ───────────── */
const screens = {select:'scr-select', team:'scr-team', lock:'scr-lock'};
function show(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(screens[name]).classList.add('on');
}
function refreshHeader(){
  const l = document.getElementById('subLeft');
  const r = document.getElementById('subRight');
  if(state.myTeam){
    const t = TEAMS.find(t=>t.id===state.myTeam);
    l.textContent = '내 구단';
    r.textContent = t.name;
  }else{
    l.textContent = '구단을 선택하세요';
    r.textContent = '';
  }
}

/* ───────────── 팀 선택 ───────────── */
function renderTeamGrid(){
  const g = document.getElementById('teamGrid');
  g.innerHTML = '';
  TEAMS.forEach(t=>{
    const d = document.createElement('div');
    d.className = 'tcard';
    d.innerHTML = `<div class="stripe" style="background:${t.c}"></div>
      <div class="tname">${t.name}</div><div class="treal">${t.real}</div>`;
    d.onclick = ()=>{
      if(confirm(`${t.name}(${t.real})을(를) 내 구단으로 선택할까요?\n선수 전원 능력치 +${BOOST} 보정이 적용됩니다.`)){
        state.myTeam = t.id; save();
        refreshHeader(); renderRoster('bat'); show('team');
      }
    };
    g.appendChild(d);
  });
}

/* ───────────── 로스터 ───────────── */
let rosterTab = 'bat';
function renderRoster(tab){
  rosterTab = tab;
  document.getElementById('tabBat').classList.toggle('on', tab==='bat');
  document.getElementById('tabPit').classList.toggle('on', tab==='pit');
  const t = TEAMS.find(t=>t.id===state.myTeam);
  document.getElementById('rosterTitle').innerHTML =
    `${t.name} 로스터 <small>선수를 터치하면 모델 선수 공개</small>`;
  const list = document.getElementById('plist');
  list.innerHTML = '';
  const arr = tab==='bat' ? t.bat : t.pit;
  arr.forEach((p,i)=>{
    const row = document.createElement('div');
    row.className = 'prow';
    const pos = tab==='bat' ? p[2] : p[2];
    const ovr = tab==='bat' ? batOvr(p,t.id) : pitOvr(p,t.id);
    const hand = tab==='bat' ? `${p[3]}타` : `${p[3]}투 · ${p[2]}`;
    row.innerHTML = `<div class="pos">${pos==='선발'?'SP':pos==='마무리'?'CL':pos}</div>
      <div class="mid"><div class="nm">${p[0]}</div><div class="hand">${hand}${isMine(t.id)?' <span class="boost">+'+BOOST+'</span>':''}</div></div>
      <div class="ovr num">${ovr}</div>`;
    row.onclick = ()=>openSheet(t, tab, i);
    list.appendChild(row);
  });
}

/* ───────────── 선수 상세 ───────────── */
function statRow(label, val){
  return `<div class="stat"><div class="sl"><span>${label}</span><span class="v">${val}</span></div>
    <div class="bar"><i style="width:${Math.min(100,val)}%"></i></div></div>`;
}
function openSheet(team, tab, idx){
  const p = (tab==='bat'?team.bat:team.pit)[idx];
  const sheet = document.getElementById('sheet');
  let statsHtml, meta;
  if(tab==='bat'){
    const [nm,real,pos,hand,con,pow,spd,def,eye] = p;
    meta = `${pos} · ${hand}타 · OVR <b class="num">${batOvr(p,team.id)}</b>`;
    statsHtml = statRow('컨택', b(con,team.id)) + statRow('파워', b(pow,team.id))
      + statRow('주루', b(spd,team.id)) + statRow('수비', b(def,team.id)) + statRow('선구', b(eye,team.id));
  }else{
    const [nm,real,role,hand,velo,ctrl,brk,sta] = p;
    meta = `${role} · ${hand}투 · OVR <b class="num">${pitOvr(p,team.id)}</b>`;
    statsHtml = `<div class="stat"><div class="sl"><span>구속</span><span class="v">${bv(velo,team.id)} km/h</span></div>
      <div class="bar"><i style="width:${Math.min(100,(bv(velo,team.id)-125)*2.4)}%"></i></div></div>`
      + statRow('제구', b(ctrl,team.id)) + statRow('변화구', b(brk,team.id)) + statRow('체력', b(sta,team.id));
  }
  sheet.innerHTML = `
    <div class="top"><div class="pname">${p[0]}</div>
      <button class="close" onclick="closeSheet()">✕</button></div>
    <div class="meta">${meta}${isMine(team.id)?' · <span class="boost">내 구단 보정 +'+BOOST+'</span>':''}</div>
    <div class="reveal"><div class="lbl">MODEL PLAYER</div>
      실제 모델: <b>${p[1]}</b> (${team.real})<br>
      2025시즌 성적을 참고한 추정 능력치입니다.</div>
    ${statsHtml}`;
  document.getElementById('mask').classList.add('on');
}
function closeSheet(){ document.getElementById('mask').classList.remove('on'); }
document.getElementById('mask').addEventListener('click', e=>{
  if(e.target.id==='mask') closeSheet();
});

/* ───────────── 내비 ───────────── */
document.querySelectorAll('nav button').forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
    btn.classList.add('on');
    const nv = btn.dataset.nav;
    if(nv==='team'){
      if(state.myTeam){ renderRoster(rosterTab); show('team'); }
      else show('select');
    }else{
      const names = {lineup:'라인업', game:'경기', rank:'순위'};
      document.getElementById('lockText').textContent =
        `${names[nv]} — 다음 업데이트(v0.2)에서 열립니다`;
      show('lock');
    }
  };
});

document.getElementById('tabBat').onclick = ()=>renderRoster('bat');
document.getElementById('tabPit').onclick = ()=>renderRoster('pit');
document.getElementById('resetBtn').onclick = ()=>{
  if(confirm('구단 선택과 저장 데이터를 초기화할까요?')){
    state = {myTeam:null}; save(); refreshHeader(); show('select');
  }
};

/* ───────────── 시작 ───────────── */
renderTeamGrid();
refreshHeader();
if(state.myTeam){ renderRoster('bat'); show('team'); }
else show('select');
</script>
</body>
</html>
